<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Search Form</title>
</head>

<body style="background-color:saddlebrown">
    <div style="-webkit-text-fill-color: blue;">
        <form action="https://www.flipkart.com/search">
            <label for="Flipkart">Flipkart Search: </label>
            <input type="text" name="q">
            <button>Submit</button>
        </form>
    </div>
    <br>
    <div style="-webkit-text-fill-color: red;">
        <form action="https://www.youtube.com/results">
            <label for="Youtube">Youtube Search: </label>
            <input type="text" name="search_query">
            <Button>Search</Button>
        </form>
    </div>
    <br>
    <div>
        <form action="https://www.google.com/search">
            <label for="Youtube">Google Search: </label>
            <input type="text" name="q">
            <Button>Search</Button>
        </form>
    </div>


</body>

</html>
