<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
</head>

<body>
    <h2>Novel Services Login</h2>

    <form action="#">

        <label for="username">Username: </label>
        <input type="text" name="username" id="username">

        <br><br>

        <label for="password">Password: </label>
        <input type="password" name="password" id="password">

        <br><br>

        <label for="city">City of Employment: </label>
        <input type="text" name="city" id="city">

        <br><br>

        <label for="server">Web server: </label>
        <select name="server" id="select">
            <option value="">---Chode a server---</option>
            <option value="IND">Indian Server</option>
            <option value="US">United States Server</option>
            <option value="RUSS">Russia Server</option>
            <option value="NY">New Yeark Server</option>
        </select>

        <br><br>

        <label for="role">Please specify your role :</label><br>
        <input type="radio" name="role" id="role" value="admin"><label for="admin">Admin</label><br>
        <input type="radio" name="role" id="role" value="engineer"><label for="engineer">Engineer</label><br>
        <input type="radio" name="role" id="role" value="manager"><label for="manager">Manager</label><br>
        <input type="radio" name="role" id="role" value="guest"><label for="guest">Guest</label>

        <br><br>

        <label for="Sign-on">Single Sign-on to the following: </label>
        <br>
        <input type="radio" name="Sign-on" id="Sign-on" value="mail"><label for="mail">Mail</label><br>
        <input type="radio" name="Sign-on" id="Sign-on" value="payroll"><label for="payroll">Payroll</label><br>
        <input type="radio" name="Sign-on" id="Sign-on" value="self-serv"><label for="self-serv">Self-services</label>
        
        <br><br>

        <button type="submit">Login</button>
        <button type="reset">Reset</button>



    </form>


</body>

</html>
