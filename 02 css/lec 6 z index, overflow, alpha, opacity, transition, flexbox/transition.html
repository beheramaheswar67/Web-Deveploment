<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 200px;
            width: 200px;
            background-color: aqua;
            transition-duration: 1s;
            /* transition-delay: 1s; */
            transition-timing-function: ease;
        }

        div:hover{
            background-color: black;
            border-radius: 50%;  
        }

        div:hover::after{
            color: red;
            content: "Maheswar";

        }

    section{
        height: 200px;
        width: 200px;
        /* margin-top: 0px; */
        background-color: darkolivegreen;
        transition: all 2s ease 0.2;
        /* transition-duration: 2s; */
    }

    section:hover {
        margin-top: 200px;
        background-color: red;
    }
        
    </style>
</head>
<body>
    <div></div>
    <section></section>
    
</body>
</html>
